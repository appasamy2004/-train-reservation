<!DOCTYPE html>
<html>
<head>
    <title>Booking History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="text-center mb-4">📜 Booking History</h2>

<table class="table table-striped table-hover shadow">

    <tr class="table-dark">
        <th>Passenger</th>
        <th>Train</th>
        <th>Source</th>
        <th>Destination</th>
        <th>Seats</th>
    </tr>

    <tr th:each="b : ${bookings}">
        <td th:text="${b.passengerName}"></td>
        <td th:text="${b.train.trainName}"></td>
        <td th:text="${b.train.source}"></td>
        <td th:text="${b.train.destination}"></td>
        <td th:text="${b.seatsBooked}"></td>
    </tr>

</table>

</body>
</html>
