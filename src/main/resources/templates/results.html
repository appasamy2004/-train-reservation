<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    min-height: 100vh;
">

<div class="container mt-5">

    <h2 class="text-center mb-4">🚆 Available Trains</h2>

    <table class="table table-striped table-hover shadow bg-white">

        <tr class="table-dark">
            <th>Name</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Seats</th>
            <th>Book</th>
        </tr>

        <tr th:each="train : ${trains}">
            <td th:text="${train.trainName}"></td>
            <td th:text="${train.source}"></td>
            <td th:text="${train.destination}"></td>
            <td th:text="${train.seatsAvailable}"></td>

            <td>
                <form action="/book" method="post" class="d-flex gap-2">
                    <input type="hidden" name="trainId" th:value="${train.id}" />

                    <input type="text" name="name" placeholder="Name"
                           class="form-control" required>

                    <input type="number" name="seats" placeholder="Seats"
                           class="form-control" required>

                    <button class="btn btn-success">Book</button>
                </form>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
