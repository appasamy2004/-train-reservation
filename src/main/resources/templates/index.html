<!DOCTYPE html>
<html>
<head>
    <title>Train Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="
    background: url('https://images.unsplash.com/photo-1474487548417-781cb71495f3') no-repeat center center/cover;
    height: 100vh;
">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">🚆 Train Reservation</span>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
</nav>

<div class="d-flex justify-content-center align-items-center" style="height:90vh;">

    <div class="card p-4 shadow-lg"
         style="width: 400px; background: rgba(255,255,255,0.9); border-radius: 15px;">

        <h2 class="text-center mb-4">🔍 Search Train</h2>

        <form action="/search" method="post">

            <input type="text" name="source" placeholder="Source"
                   class="form-control mb-3" required>

            <input type="text" name="destination" placeholder="Destination"
                   class="form-control mb-3" required>

            <button class="btn btn-primary w-100">Search</button>
            <a href="/history" class="btn btn-info me-2">Book History</a>
        </form>

    </div>



</div>



</body>
</html>
